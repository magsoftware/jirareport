name: Daily Report

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional snapshot date in YYYY-MM-DD format"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  generate-daily-report:
    runs-on: ubuntu-latest

    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY || 'LA004832' }}
      REPORT_TIMEZONE: ${{ vars.REPORT_TIMEZONE || 'Europe/Warsaw' }}
      REPORT_STORAGE_BACKEND: gcs
      GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME }}
      GCS_BUCKET_PREFIX: ${{ vars.GCS_BUCKET_PREFIX || 'jirareport' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Generate daily snapshot
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            uv run jirareport daily --date "${{ github.event.inputs.report_date }}"
          else
            uv run jirareport daily
          fi
